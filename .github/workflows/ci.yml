name: Train and Push Model

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  run-pipeline:
    name: Generate → Features → Train
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure DVC S3 remote
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          dvc remote modify s3remote access_key_id "$AWS_ACCESS_KEY_ID"
          dvc remote modify s3remote secret_access_key "$AWS_SECRET_ACCESS_KEY"

      - name: Run DVC pipeline
        run: dvc repro

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: churn-model
          path: models/churn_model.pkl

      - name: Upload DVC cache
        uses: actions/upload-artifact@v4
        with:
          name: dvc-cache
          path: .dvc/cache

  push-model-to-s3:
    name: Push Model to S3
    runs-on: ubuntu-latest
    needs: run-pipeline

    steps:
      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: churn-model
          path: models/

      - name: Push model to S3 for KServe
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
        run: |
          echo "Uploading to ${{ vars.AWS_S3_DVC_BUCKET }}/dvc-storage-mobile-churn-model/model/"
          aws s3 cp models/churn_model.pkl \
            ${{ vars.AWS_S3_DVC_BUCKET }}/dvc-storage-mobile-churn-model/model/churn_model.pkl

  push-dvc-artifacts:
    name: Push Artifacts to DVC Remote
    runs-on: ubuntu-latest
    needs: run-pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore DVC cache
        uses: actions/download-artifact@v4
        with:
          name: dvc-cache
          path: .dvc/cache

      - name: Configure DVC S3 remote
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          dvc remote modify s3remote access_key_id "$AWS_ACCESS_KEY_ID"
          dvc remote modify s3remote secret_access_key "$AWS_SECRET_ACCESS_KEY"

      - name: Push DVC artifacts to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
        run: dvc push
